<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد | نجمة ديجيتال ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            font-family: 'Cairo', sans-serif; transition: background 1.5s ease;
            background-color: #fff9eb;
        }

        .container {
            height: 100vh; width: 100%; display: flex;
            align-items: center; justify-content: center; position: relative;
            z-index: 10;
        }

        .page {
            position: absolute; width: 90%; max-width: 450px;
            text-align: center; opacity: 0; visibility: hidden;
            transform: scale(0.8); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .page.active { opacity: 1; visibility: visible; transform: scale(1); }

        /* كارت المفاجأة الأبيض */
        .card-visual {
            width: 260px; height: 260px; margin: 0 auto 30px;
            background: #fff; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px rgba(255, 193, 7, 0.15);
            border: 6px solid #fff; position: relative;
            font-size: 140px;
        }

        h1 { font-size: 32px; color: #b8860b; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        p { font-family: 'Amiri', serif; font-size: 24px; color: #444; line-height: 1.5; margin-bottom: 35px; padding: 0 10px; }

        .btn-celebrate {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: white; border: none;
            padding: 15px 50px; border-radius: 50px; font-size: 20px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(184, 134, 11, 0.3);
        }
        .btn-celebrate:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(184, 134, 11, 0.4); }

        /* تأثير البالونات والنجوم */
        .confetti {
            position: absolute; top: -50px;
            pointer-events: none; z-index: 1;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="slider"></div>

    <script>
        const bdayStory = [
            { t: "اليوم يومك! ✨", p: "في هذا اليوم الجميل، وُلدت قطعة من السكر لتنير حياتنا.", emoji: "🎂", bg: "#fff9eb", btn: "شنو المفاجأة؟ 🎁" },
            { t: "كل عام وأنتِ بخير 🎈", p: "أتمنى لكِ سنة تشبه طيبة قلبكِ وجمال روحكِ.", emoji: "🎁", bg: "#fef3f3", btn: "وبعد؟ ✨" },
            { t: "سنة مليئة بالحب ❤️", p: "عسى أيامكِ كلها ضحك وفرح، وما تغيب الابتسامة عن وجهكِ.", emoji: "🕯️", bg: "#f0f4ff", btn: "أمنية غالية 🌟" },
            { t: "أنتِ استثنائية 👑", p: "كبرتِ سنة، وكبر حبكِ في قلبي ألف سنة.. أحبكِ.", emoji: "👸", bg: "#fdf2ff", btn: "عيد ميلاد سعيد 🎊" }
        ];

        let cur = 0;
        const slider = document.getElementById('slider');

        function build() {
            bdayStory.forEach((page, i) => {
                const div = document.createElement('div');
                div.className = `page ${i === 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="card-visual">${page.emoji}</div>
                    <h1>${page.t}</h1>
                    <p>${page.p}</p>
                    <button class="btn-celebrate" onclick="${i === bdayStory.length - 1 ? 'location.reload()' : 'nextPage()'}">${page.btn}</button>
                `;
                slider.appendChild(div);
            });
            document.body.style.backgroundColor = bdayStory[0].bg;
        }

        function nextPage() {
            const pages = document.querySelectorAll('.page');
            pages[cur].classList.remove('active');
            cur++;
            pages[cur].classList.add('active');
            document.body.style.backgroundColor = bdayStory[cur].bg;
            
            // زيادة الاحتفال عند الضغط
            for(let i=0; i<10; i++) createConfetti();
        }

        function createConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.innerHTML = ['✨', '🎈', '🎉', '🌟', '🧁'][Math.floor(Math.random() * 5)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.fontSize = Math.random() * 20 + 20 + 'px';
            c.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 5000);
        }

        setInterval(createConfetti, 500);
        build();
    </script>
</body>
</html>
