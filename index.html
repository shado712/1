<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجمة ديجيتال | عيد ميلاد ملكي 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            font-family: 'Cairo', sans-serif; transition: background 1.5s ease;
            background-color: #fdf2ff;
        }

        .container {
            height: 100vh; width: 100%; display: flex;
            align-items: center; justify-content: center; position: relative;
            z-index: 10;
        }

        .page {
            position: absolute; width: 90%; max-width: 450px;
            text-align: center; opacity: 0; visibility: hidden;
            transform: scale(0.5) rotate(-10deg); transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .page.active { opacity: 1; visibility: visible; transform: scale(1) rotate(0deg); }

        /* كارت المفاجأة المطور */
        .card-visual {
            width: 250px; height: 250px; margin: 0 auto 25px;
            background: #fff; border-radius: 60px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 25px 50px rgba(184, 134, 11, 0.1);
            border: 8px solid #fff; position: relative;
            font-size: 130px;
        }

        h1 { font-size: 28px; color: #b8860b; margin-bottom: 10px; }
        p { font-family: 'Amiri', serif; font-size: 22px; color: #555; line-height: 1.4; margin-bottom: 30px; }

        /* الأزرار التفاعلية بأشكال خاصة */
        .btn-custom {
            color: white; border: none;
            padding: 20px 40px; font-size: 18px;
            font-weight: 900; cursor: pointer; transition: 0.4s;
            display: inline-block; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* شكل 1: شكل الغيمة الوردية */
        .btn-cloud {
            background: #ff8fa3;
            border-radius: 50px 50px 50px 50px;
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
        }

        /* شكل 2: شكل النجمة الذهبية */
        .btn-star {
            background: #ffd700; color: #b8860b;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            padding: 30px 50px;
        }

        /* شكل 3: شكل الوردة أو المسنن */
        .btn-flower {
            background: #bc8f8f;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        /* شكل 4: الزر الملكي */
        .btn-royal {
            background: linear-gradient(to right, #b8860b, #ffd700);
            border-radius: 15px;
            transform: skew(-10deg);
        }

        .btn-custom:hover { transform: scale(1.1) rotate(5deg); filter: brightness(1.1); }

        /* تأثير المطر الاحتفالي */
        .item {
            position: absolute; top: -50px;
            pointer-events: none; z-index: 1;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="slider"></div>

    <script>
        const bdayStory = [
            { t: "اليوم ميلادك! ✨", p: "في هذا اليوم الجميل، وُلدت أغلى قطعة سكر في العالم.", emoji: "🎂", bg: "#fdf2ff", btn: "افتح الهدية 🎁", style: "btn-cloud" },
            { t: "كبرتِ سنة 🎈", p: "سنة جديدة يملؤها الفرح والضحك، يا شمعة تضوي الدرب.", emoji: "🧁", bg: "#fff9eb", btn: "أمنية غالية 🌟", style: "btn-star" },
            { t: "يا أجمل القلوب ❤️", p: "كل عام وأنتِ بقلبي أغلى من كل الناس، أحبكِ بجنون.", emoji: "🧸", bg: "#f0f4ff", btn: "وبعد؟ ✨", style: "btn-flower" },
            { t: "أنتِ استثنائية 👸", p: "كبرتِ سنة، وزاد الحلا بيكِ مية سنة.. يا ملكتي.", emoji: "👑", bg: "#fef3f3", btn: "مفاجأة 🎊", style: "btn-royal" },
            { t: "سنة النجاح 🌟", p: "أتمنى لكِ في عامكِ الجديد كل النجاح وتحقيق الأحلام.", emoji: "🎓", bg: "#e8f5e9", btn: "كلمة أخيرة 💌", style: "btn-cloud" },
            { t: "أحبكِ للأبد ❤️", p: "شكراً لأنكِ موجودة في حياتي.. كل عام وأنتِ بخير.", emoji: "🥰", bg: "#ffffff", btn: "ابدأ من جديد 🔄", style: "btn-royal" }
        ];

        let cur = 0;
        const slider = document.getElementById('slider');

        function build() {
            bdayStory.forEach((page, i) => {
                const div = document.createElement('div');
                div.className = `page ${i === 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="card-visual">${page.emoji}</div>
                    <h1>${page.t}</h1>
                    <p>${page.p}</p>
                    <button class="btn-custom ${page.style}" onclick="${i === bdayStory.length - 1 ? 'location.reload()' : 'nextPage()'}">${page.btn}</button>
                `;
                slider.appendChild(div);
            });
            document.body.style.backgroundColor = bdayStory[0].bg;
        }

        function nextPage() {
            const pages = document.querySelectorAll('.page');
            pages[cur].classList.remove('active');
            cur++;
            pages[cur].classList.add('active');
            document.body.style.backgroundColor = loveStory[cur]?.bg || bdayStory[cur].bg;
            
            // دفع انفجار احتفالي
            for(let i=0; i<15; i++) createItem();
        }

        function createItem() {
            const c = document.createElement('div');
            c.className = 'item';
            c.innerHTML = ['✨', '🎈', '🎉', '🌟', '🧁', '👑'][Math.floor(Math.random() * 6)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.fontSize = Math.random() * 20 + 20 + 'px';
            c.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 5000);
        }

        setInterval(createItem, 400);
        build();
    </script>
</body>
</html>
