<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجمة ديجيتال | قصة حب ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; overflow: hidden; 
            font-family: 'Cairo', sans-serif; transition: background 1.5s ease;
            background-color: #fff5f7;
        }

        .container {
            height: 100vh; width: 100%; display: flex;
            align-items: center; justify-content: center; position: relative;
            z-index: 10;
        }

        .page {
            position: absolute; width: 90%; max-width: 450px;
            text-align: center; opacity: 0; visibility: hidden;
            transform: translateY(30px); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .page.active { opacity: 1; visibility: visible; transform: translateY(0); }

        /* كارت الإيموجي الفخم - نمط نجمة ديجيتال */
        .emoji-card {
            width: 250px; height: 250px; margin: 0 auto 25px;
            background: #fff; border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.12);
            border: 5px solid #fff; position: relative;
            font-size: 130px; /* حجم الإيموجي */
        }
        
        .emoji-card::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,143,163,0.2) 0%, transparent 70%);
            z-index: -1;
        }

        h1 { font-size: 30px; color: #d63384; margin-bottom: 12px; }
        p { font-family: 'Amiri', serif; font-size: 22px; color: #555; line-height: 1.6; margin-bottom: 30px; font-weight: bold; }

        .btn-action {
            background: #ff4d6d; color: white; border: none;
            padding: 14px 45px; border-radius: 50px; font-size: 18px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }
        .btn-action:hover { transform: scale(1.1); background: #d63384; }

        .heart-rain {
            position: absolute; top: -50px;
            pointer-events: none; z-index: 1;
            animation: fallEffect linear forwards;
        }
        @keyframes fallEffect { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body id="masterBody">

    <div class="container" id="slider"></div>

    <script>
        const loveStory = [
            { t: "أنتِ استثنائية 👑", p: "في عالم مليء بالوجوه، عيناكِ هي المكان الذي أنتمي إليه.", emoji: "👸", bg: "#fff0f3", btn: "اكتشف الحكاية ✨" },
            { t: "أجمل الذكريات 📸", p: "لم يكن مجرد لقاء، كان بداية لعمر جديد يملؤه الحب.", emoji: "📸", bg: "#f0f7ff", btn: "وبعدها؟ ❤️" },
            { t: "سند لا يميل 💪", p: "سأكون خلفكِ جبلاً يحميكِ، ومعكِ قلباً لا يترككِ أبداً.", emoji: "🛡️", bg: "#f1f8e9", btn: "وعد الأبد 💍" },
            { t: "أنتِ هدية السماء 🎁", p: "كل يوم معكِ هو عيد، وكل لحظة بقربكِ هي حياة.", emoji: "🎁", bg: "#fff9e6", btn: "يا روحي 🌹" },
            { t: "المكان الآمن 🌏", p: "لا تهمني المسافات، فأنتِ تسكنين في النبضة الأقرب لقلبي.", emoji: "🌏", bg: "#e1f5fe", btn: "نهاية الحكاية ✨" },
            { t: "شكر من القلب ❤️", p: "شكراً لأنكِ كنتِ الأجمل دائماً. أحبكِ اليوم وكل يوم.", emoji: "🥰", bg: "#ffffff", btn: "ابدأ من جديد 🔄" }
        ];

        let cur = 0;
        const slider = document.getElementById('slider');

        function build() {
            loveStory.forEach((page, i) => {
                const div = document.createElement('div');
                div.className = `page ${i === 0 ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="emoji-card">${page.emoji}</div>
                    <h1>${page.t}</h1>
                    <p>${page.p}</p>
                    <button class="btn-action" onclick="${i === loveStory.length - 1 ? 'location.reload()' : 'nextPage()'}">${page.btn}</button>
                `;
                slider.appendChild(div);
            });
            document.body.style.backgroundColor = loveStory[0].bg;
        }

        function nextPage() {
            const pages = document.querySelectorAll('.page');
            pages[cur].classList.remove('active');
            cur++;
            pages[cur].classList.add('active');
            document.body.style.backgroundColor = loveStory[cur].bg;
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-rain';
            h.innerHTML = ['💖', '🌸', '✨', '💎'][Math.floor(Math.random() * 4)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 15 + 20 + 'px';
            h.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);

        build();
    </script>
</body>
</html>
