<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Digital Card | Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh; overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(45deg, #fff1f2, #fdf2f8, #f0f9ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية الكروت الزجاجية */
        .card-container {
            height: 100vh; width: 100%; display: flex;
            align-items: center; justify-content: center; position: relative;
        }

        .card {
            position: absolute; width: 85%; max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: var(--shadow);
            padding: 30px; text-align: center;
            opacity: 0; visibility: hidden;
            transform: scale(0.9) translateY(20px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.active { opacity: 1; visibility: visible; transform: scale(1) translateY(0); }

        .img-box {
            width: 100%; height: 220px; border-radius: 20px;
            margin-bottom: 20px; overflow: hidden;
            border: 3px solid #fff;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        h2 { color: var(--primary); font-size: 28px; margin-bottom: 10px; }
        p { font-family: 'Amiri', serif; font-size: 20px; color: #444; line-height: 1.5; margin-bottom: 25px; }

        .next-btn {
            background: var(--primary); color: #fff; border: none;
            padding: 12px 40px; border-radius: 50px; font-weight: 900;
            cursor: pointer; transition: 0.3s; width: 100%;
        }
        .next-btn:hover { letter-spacing: 2px; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); }

        /* ذرات متطايرة */
        .particle {
            position: absolute; pointer-events: none; z-index: -1;
            animation: fly linear forwards;
        }
        @keyframes fly { to { transform: translateY(-110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card-container" id="slider">
        <div class="card active">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1530103862676-fa8c9d34bb34?auto=format&fit=crop&w=500" alt="عيد ميلاد">
            </div>
            <h2>لحظة خاصة ✨</h2>
            <p>أهلاً بك في عالم من المشاعر.. اضغط لتبدأ الرحلة معنا.</p>
            <button class="next-btn" onclick="nextCard()">اكتشف المزيد</button>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1513151233558-d860c53b8006?auto=format&fit=crop&w=500" alt="احتفال">
            </div>
            <h2>فخامة التفاصيل 👑</h2>
            <p>نصنع لك من الكلمات ذكريات لا تموت، بأسلوب عصري وأنيق.</p>
            <button class="next-btn" onclick="nextCard()">التالي</button>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?auto=format&fit=crop&w=500" alt="حب">
            </div>
            <h2>ابدأ مشروعك الآن 🚀</h2>
            <p>هذا القالب هو مجرد بداية لما يمكنك تقديمه لزبائنك.</p>
            <button class="next-btn" onclick="location.reload()">إعادة العرض</button>
        </div>
    </div>

    <script>
        let current = 0;
        const cards = document.querySelectorAll('.card');

        function nextCard() {
            if (current < cards.length - 1) {
                cards[current].classList.remove('active');
                current++;
                cards[current].classList.add('active');
            }
        }

        // تأثير البارتيكلز
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = ['✨', '💖', '🌸', '⭐'][Math.floor(Math.random() * 4)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '110vh';
            p.style.fontSize = Math.random() * 20 + 10 + 'px';
            p.style.animationDuration = Math.random() * 3 + 5 + 's';
            p.style.opacity = Math.random();
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }, 300);
    </script>
</body>
</html>
