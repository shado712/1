<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع حيدر للبطاقات الرقمية ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff4d6d; --accent: #7209b7; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh; overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a; /* خلفية سوداء فخمة لعرض الألوان */
            display: flex; align-items: center; justify-content: center;
        }

        /* حاوية العرض */
        .showcase {
            width: 90%; max-width: 400px; height: 80vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px;
        }

        /* الدوائر الملونة في الخلفية */
        .blob {
            position: absolute; width: 200px; height: 200px;
            background: var(--main); border-radius: 50%;
            filter: blur(60px); z-index: -1; animation: move 10s infinite alternate;
        }
        @keyframes move { from { transform: translate(-50%, -50%); } to { transform: translate(50%, 50%); } }

        .icon-box { font-size: 80px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        h1 { font-family: 'Aref Ruqaa', serif; font-size: 35px; color: var(--main); margin-bottom: 15px; }
        p { font-size: 18px; line-height: 1.6; opacity: 0.8; margin-bottom: 30px; }

        .cta-btn {
            background: var(--main); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-weight: 900;
            font-size: 20px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }
        .cta-btn:hover { transform: scale(1.1); letter-spacing: 1px; }

        /* تذييل الصفحة باسمك */
        .footer { position: absolute; bottom: 20px; font-size: 14px; opacity: 0.5; }

        /* جزيئات طائرة */
        .sparkle { position: absolute; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="showcase">
        <div class="icon-box">🎁</div>
        <h1>بطاقتك الرقمية الأولى</h1>
        <p>حوّل مشاعرك، ذكرياتك، واحتفالاتك إلى رابط (Link) فخم يدوم للأبد. بأسلوب ملكي وتصميم عصري.</p>
        
        <button class="cta-btn" onclick="startShow()">ابدأ التجربة ✨</button>

        <div class="footer">صمم بواسطة حيدر | 2026</div>
    </div>

    <script>
        function startShow() {
            // هنا نضع الأكشن الذي سيحدث عند الضغط، مثلاً تحويل لصفحة ثانية أو رسالة
            const btn = document.querySelector('.cta-btn');
            btn.innerHTML = "قريباً.. 🔥";
            btn.style.background = "#7209b7";
            
            setTimeout(() => {
                alert("أهلاً بك في مشروعنا! قريباً سنطلق مجموعة من القوالب الملكية.");
            }, 500);
        }

        // إنشاء جزيئات النجوم في الخلفية
        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 4 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.opacity = Math.random();
            document.body.appendChild(s);
            
            setTimeout(() => s.remove(), 3000);
        }
        setInterval(createSparkle, 100);
    </script>
</body>
</html>
